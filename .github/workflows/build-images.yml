name: Build and Publish FastVM Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        desktop:
          - xfce4
          - kde
          - gnome
          - cinnamon
          - lxqt
          - i3
          - budgie
        preset:
          - none
          - minimal
          - gaming
          - development
          - office
          - content-creation

    permissions:
      contents: read
      packages: write

    steps:
      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags for ${{ matrix.desktop }}-${{ matrix.preset }}
        id: tags
        run: |
          FULL_TAG="${{ matrix.desktop }}-${{ matrix.preset }}"

          echo "full_tag=$FULL_TAG" >> $GITHUB_OUTPUT

          TAGS="${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:$FULL_TAG-latest"

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            TAGS="$TAGS"$'\n'"${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:$FULL_TAG-$VERSION"
          fi

          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Prepare Dockerfile context for ${{ matrix.desktop }}-${{ matrix.preset }}
        run: |
          mkdir -p /tmp/build-context
          cp -r . /tmp/build-context/
          cd /tmp/build-context

          # Modify config.env for this build
          sed -i "s/FASTVM_DE=.*/FASTVM_DE=${{ matrix.desktop }}/" config.env
          sed -i "s/FASTVM_PRESET=.*/FASTVM_PRESET=${{ matrix.preset }}/" config.env

      - name: Build and push ${{ matrix.desktop }}-${{ matrix.preset }}
        uses: docker/build-push-action@v5
        with:
          context: /tmp/build-context
          file: /tmp/build-context/Dockerfile.optimized
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=FastVM ${{ matrix.desktop }}-${{ matrix.preset }}
            org.opencontainers.image.description=FastVM with ${{ matrix.desktop }} desktop + ${{ matrix.preset }} preset
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache-${{ matrix.desktop }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache-${{ matrix.desktop }},mode=max
          build-args: |
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VERSION=${{ github.ref_name }}

  build-specials:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: browser
            app_script: browser-only.sh
            autostart_cmd: google-chrome-stable --no-sandbox --disable-gpu-sandbox
            description: Chrome browser only, no desktop environment
          - name: discord
            app_script: discord-only.sh
            autostart_cmd: /usr/bin/discord --no-sandbox
            description: Discord only, no desktop environment
          - name: vscode
            app_script: vscode-only.sh
            autostart_cmd: codium --no-sandbox
            description: VSCodium only, no desktop environment
          - name: terminal
            app_script: terminal-only.sh
            autostart_cmd: xfce4-terminal
            description: Terminal only, no desktop environment

    permissions:
      contents: read
      packages: write

    steps:
      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags for ${{ matrix.name }}
        id: tags
        run: |
          TAGS="${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ matrix.name }}-latest"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAGS="$TAGS"$'\n'"${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ matrix.name }}-${{ github.ref_name }}"
          fi
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Prepare context for ${{ matrix.name }}
        run: |
          mkdir -p /tmp/build-context
          cp -r . /tmp/build-context/
          cd /tmp/build-context

          # Point to the single-app startwm and set the app command via env
          sed -i "s/FASTVM_DE=.*/FASTVM_DE=singleapp/" config.env
          sed -i "s/FASTVM_PRESET=.*/FASTVM_PRESET=none/" config.env
          echo "FASTVM_SINGLEAPP_CMD=${{ matrix.autostart_cmd }}" >> config.env
          echo "FASTVM_SINGLEAPP_SCRIPT=${{ matrix.app_script }}" >> config.env

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: /tmp/build-context
          file: /tmp/build-context/Dockerfile.optimized
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=FastVM ${{ matrix.name }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.version=${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache-specials
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache-specials,mode=max
          build-args: |
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VERSION=${{ github.ref_name }}

  build-summary:
    runs-on: ubuntu-latest
    needs: [build, build-specials]
    if: always()
    steps:
      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build Summary
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.image.outputs.name }}"
          echo "## 🎉 FastVM: 46 Production-Ready Images Built!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 42 Desktop + Preset Combinations" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Format:** \`$IMAGE:<desktop>-<preset>-latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 🏃 XFCE4 | 👑 KDE | 🍒 GNOME | 🎨 Cinnamon | 🪶 LXQT | ⌨️ i3 | 🎯 Budgie |" >> $GITHUB_STEP_SUMMARY
          echo "|:---|:---|:---|:---|:---|:---|:---|" >> $GITHUB_STEP_SUMMARY
          echo "| **-none** | **-none** | **-none** | **-none** | **-none** | **-none** | **-none** |" >> $GITHUB_STEP_SUMMARY
          echo "| **-minimal** | **-minimal** | **-minimal** | **-minimal** | **-minimal** | **-minimal** | **-minimal** |" >> $GITHUB_STEP_SUMMARY
          echo "| **-gaming** 🎮 | **-gaming** 🎮 | **-gaming** 🎮 | **-gaming** 🎮 | **-gaming** 🎮 | **-gaming** 🎮 | **-gaming** 🎮 |" >> $GITHUB_STEP_SUMMARY
          echo "| **-development** 💻 | **-development** 💻 | **-development** 💻 | **-development** 💻 | **-development** 💻 | **-development** 💻 | **-development** 💻 |" >> $GITHUB_STEP_SUMMARY
          echo "| **-office** 📊 | **-office** 📊 | **-office** 📊 | **-office** 📊 | **-office** 📊 | **-office** 📊 | **-office** 📊 |" >> $GITHUB_STEP_SUMMARY
          echo "| **-content-creation** 🎬 | **-content-creation** 🎬 | **-content-creation** 🎬 | **-content-creation** 🎬 | **-content-creation** 🎬 | **-content-creation** 🎬 | **-content-creation** 🎬 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚡ 4 Single-App Variants (Ultra-Minimal)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | What You Get | Size | Startup |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------------|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`browser-latest\` 🌐 | Just Chrome, nothing else | ~900 MB | 15s |" >> $GITHUB_STEP_SUMMARY
          echo "| \`discord-latest\` 💬 | Just Discord, nothing else | ~850 MB | 15s |" >> $GITHUB_STEP_SUMMARY
          echo "| \`vscode-latest\` 💻 | Just VSCodium, nothing else | ~1.1 GB | 15s |" >> $GITHUB_STEP_SUMMARY
          echo "| \`terminal-latest\` ⌨️ | Just terminal + tmux + vim | ~500 MB | 10s |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Quick Start" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Just a browser (lightest possible)" >> $GITHUB_STEP_SUMMARY
          echo "docker run -d -p 3000:3000 $IMAGE:browser-latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Just Discord" >> $GITHUB_STEP_SUMMARY
          echo "docker run -d -p 3000:3000 $IMAGE:discord-latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Full gaming setup (KDE + Steam + Wine)" >> $GITHUB_STEP_SUMMARY
          echo "docker run -d -p 3000:3000 $IMAGE:kde-gaming-latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Dev environment (XFCE4 + VSCodium)" >> $GITHUB_STEP_SUMMARY
          echo "docker run -d -p 3000:3000 $IMAGE:xfce4-development-latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **All 46 images built in parallel. GitHub Actions are free for public repos!**" >> $GITHUB_STEP_SUMMARY
