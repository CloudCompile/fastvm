name: Build and Publish FastVM Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        desktop:
          - xfce4
          - kde
          - gnome
          - cinnamon
          - lxqt
          - i3
          - budgie
        preset:
          - none
          - minimal
          - gaming
          - development
          - office
          - content-creation

    permissions:
      contents: read
      packages: write

    steps:
      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags for ${{ matrix.desktop }}-${{ matrix.preset }}
        id: tags
        run: |
          FULL_TAG="${{ matrix.desktop }}-${{ matrix.preset }}"

          echo "full_tag=$FULL_TAG" >> $GITHUB_OUTPUT

          TAGS="${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:$FULL_TAG-latest"

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            TAGS="$TAGS"$'\n'"${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:$FULL_TAG-$VERSION"
          fi

          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Prepare Dockerfile context for ${{ matrix.desktop }}-${{ matrix.preset }}
        run: |
          mkdir -p /tmp/build-context
          cp -r . /tmp/build-context/
          cd /tmp/build-context

          # Modify config.env for this build
          sed -i "s/FASTVM_DE=.*/FASTVM_DE=${{ matrix.desktop }}/" config.env
          sed -i "s/FASTVM_PRESET=.*/FASTVM_PRESET=${{ matrix.preset }}/" config.env

      - name: Build and push ${{ matrix.desktop }}-${{ matrix.preset }}
        uses: docker/build-push-action@v5
        with:
          context: /tmp/build-context
          file: /tmp/build-context/Dockerfile.optimized
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=FastVM ${{ matrix.desktop }}-${{ matrix.preset }}
            org.opencontainers.image.description=FastVM with ${{ matrix.desktop }} desktop + ${{ matrix.preset }} preset
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache-${{ matrix.desktop }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache-${{ matrix.desktop }},mode=max
          build-args: |
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VERSION=${{ github.ref_name }}

  build-summary:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build Summary
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.image.outputs.name }}"
          echo "## 🎉 FastVM: 42 Production-Ready Images Built!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 All Available Combinations" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Format:** \`$IMAGE:<desktop>-<preset>-latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 🏃 XFCE4 | 👑 KDE | 🍒 GNOME | 🎨 Cinnamon | 🪶 LXQT | ⌨️ i3 | 🎯 Budgie |" >> $GITHUB_STEP_SUMMARY
          echo "|:---|:---|:---|:---|:---|:---|:---|" >> $GITHUB_STEP_SUMMARY
          echo "| **-none** | **-none** | **-none** | **-none** | **-none** | **-none** | **-none** |" >> $GITHUB_STEP_SUMMARY
          echo "| **-minimal** | **-minimal** | **-minimal** | **-minimal** | **-minimal** | **-minimal** | **-minimal** |" >> $GITHUB_STEP_SUMMARY
          echo "| **-gaming** 🎮 | **-gaming** 🎮 | **-gaming** 🎮 | **-gaming** 🎮 | **-gaming** 🎮 | **-gaming** 🎮 | **-gaming** 🎮 |" >> $GITHUB_STEP_SUMMARY
          echo "| **-development** 💻 | **-development** 💻 | **-development** 💻 | **-development** 💻 | **-development** 💻 | **-development** 💻 | **-development** 💻 |" >> $GITHUB_STEP_SUMMARY
          echo "| **-office** 📊 | **-office** 📊 | **-office** 📊 | **-office** 📊 | **-office** 📊 | **-office** 📊 | **-office** 📊 |" >> $GITHUB_STEP_SUMMARY
          echo "| **-content-creation** 🎬 | **-content-creation** 🎬 | **-content-creation** 🎬 | **-content-creation** 🎬 | **-content-creation** 🎬 | **-content-creation** 🎬 | **-content-creation** 🎬 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Quick Start Examples" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Minimal & Fast** (30s startup)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker run -d -p 3000:3000 $IMAGE:xfce4-minimal-latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Gaming** (Steam + Wine + Proton)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker run -d -p 3000:3000 $IMAGE:kde-gaming-latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Development** (VSCodium + Git + Node)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker run -d -p 3000:3000 $IMAGE:xfce4-development-latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Content Creation** (GIMP + Blender + VLC)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker run -d -p 3000:3000 $IMAGE:gnome-content-creation-latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Preset Guide" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Preset | Apps | Size | Startup |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| **none** | Bare desktop | 1.8 GB | 45s |" >> $GITHUB_STEP_SUMMARY
          echo "| **minimal** | Terminal + Browser | 1.6 GB | 30s |" >> $GITHUB_STEP_SUMMARY
          echo "| **gaming** | Steam, Wine, Lutris | 2.4 GB | 90s |" >> $GITHUB_STEP_SUMMARY
          echo "| **development** | VSCodium, Git, Node, Docker | 2.5 GB | 120s |" >> $GITHUB_STEP_SUMMARY
          echo "| **office** | LibreOffice, Calc, Writer | 2.3 GB | 90s |" >> $GITHUB_STEP_SUMMARY
          echo "| **content-creation** | GIMP, Blender, VLC, Audacity | 3.1 GB | 150s |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **All 42 images built in parallel using GitHub Actions (free for public repos!)**" >> $GITHUB_STEP_SUMMARY
